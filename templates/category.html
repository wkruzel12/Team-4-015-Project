{% extends 'base.html' %}
{% block content %}
<section class="card">
    <h2>3) Choose Category</h2>

    <form method="post" class="category-grid">
        <label class="choice-card">
            <input type="radio" name="category" value="Sandwich" {% if selected_category == 'Sandwich' %}checked{% endif %}>
            <span>Sandwich</span>
        </label>

        <label class="choice-card">
            <input type="radio" name="category" value="Wrap" {% if selected_category == 'Wrap' %}checked{% endif %}>
            <span>Wrap</span>
        </label>

        <button type="submit">Continue to Build Order</button>
    </form>
</section>
{% endblock %}

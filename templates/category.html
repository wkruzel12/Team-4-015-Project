{% extends "base.html" %}
{% block header_title %}Choose Your Category{% endblock %}
{% block header_subtitle %}<p>Welcome back, {{ customer_name }}!</p>{% endblock %}
{% block body %}
<main class="content-screen">
    <section class="category-grid">
        <form method="post" class="category-card">
            <input type="hidden" name="category" value="sandwiches">
            <img src="{{ url_for('static', filename='assets/sandwich.png') }}" alt="Sandwiches">
            <h2>Sandwiches</h2>
            <p>Fresh made to order</p>
            <button type="submit">Build Sandwiches</button>
        </form>
        <form method="post" class="category-card">
            <input type="hidden" name="category" value="wraps">
            <img src="{{ url_for('static', filename='assets/wrap.png') }}" alt="Wraps">
            <h2>Wraps</h2>
            <p>Fresh and light</p>
            <button type="submit">Build Wraps</button>
        </form>
    </section>
</main>
{% endblock %}

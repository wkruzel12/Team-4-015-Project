{% extends 'base.html' %}
{% block content %}
<section class="card">
    <h2>7) Order Received</h2>
    <p>Thank you, {{ customer_name }}! Your order has been received.</p>
    <p><strong>Order ID:</strong> {{ latest_order_id }}</p>
    <p>Estimated wait time: <strong>10 to 15 minutes</strong>.</p>

    <div class="button-row">
        <a class="button-link" href="{{ url_for('index') }}">Place Another Order</a>
        <a class="button-link" href="{{ url_for('orders_management') }}">View Orders Management</a>
    </div>
</section>
{% endblock %}

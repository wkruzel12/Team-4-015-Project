{% extends 'base.html' %}
{% block content %}
<section class="card">
    <h2>2) Customer Information</h2>
    <p>If you are a returning customer, your name may already be filled in.</p>

    <form method="post" class="form-grid">
        <label for="customer_name">Customer Name</label>
        <input id="customer_name" name="customer_name" type="text" value="{{ prefill_name }}" placeholder="Enter full name" required>

        <button type="submit">Continue to Category</button>
    </form>
</section>
{% endblock %}

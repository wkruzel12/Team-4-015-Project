{% extends "base.html" %}
{% block header_title %}Customer Information{% endblock %}
{% block body %}
<main class="hero-screen">
    <div class="overlay"></div>
    <section class="form-card compact-card">
        <form method="post" class="stack-form">
            <label for="name">Name *</label>
            <input id="name" name="name" type="text" value="{{ customer.name }}">
            <label for="phone">Phone Number</label>
            <input id="phone" value="{{ customer.phone }}" readonly>
            <small>Phone number cannot be changed.</small>
            <div class="button-row">
                <a class="secondary-button" href="{{ url_for('review_order') }}">Back</a>
                <button type="submit">Continue</button>
            </div>
        </form>
    </section>
</main>
{% endblock %}

{% extends 'base.html' %}
{% block content %}
<section class="card">
    <h2>1) Start Your Order</h2>
    <p>Enter your phone number. We use this to recognize returning customers.</p>

    <form action="{{ url_for('start_order') }}" method="post" class="form-grid">
        <label for="phone_number">Phone Number (10 digits)</label>
        <input id="phone_number" name="phone_number" type="text" maxlength="10" placeholder="Example: 5551234567" required>

        <button type="submit">Continue</button>
    </form>
</section>
{% endblock %}

{% extends "base.html" %}
{% block header_title %}Welcome{% endblock %}
{% block body %}
<main class="hero-screen">
    <div class="overlay"></div>
    <section class="form-card compact-card">
        <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="Bistro Burnett" class="logo-medium">
        <h2>Looks like you're new here.</h2>
        <p>Let's get to know you.</p>
        <form method="post" class="stack-form">
            <label for="name">What's your name? *</label>
            <input id="name" name="name" type="text" placeholder="Enter your name" value="{{ name }}">
            <div class="button-row">
                <a class="secondary-button" href="{{ url_for('welcome') }}">Back</a>
                <button type="submit">Continue</button>
            </div>
        </form>
    </section>
</main>
{% endblock %}

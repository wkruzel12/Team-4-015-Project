{% extends "base.html" %}
{% block header_title %}Payment{% endblock %}
{% block body %}
<main class="hero-screen">
    <div class="overlay"></div>
    <section class="form-card compact-card">
        <h2>Pay at Counter</h2>
        <p>Complete your payment when you pick up your order.</p>
        <form method="post" class="stack-form">
            <label><input type="radio" name="payment_method" value="Campus Cash Card" {% if payment_method == 'Campus Cash Card' %}checked{% endif %}> Campus Cash Card</label>
            <label><input type="radio" name="payment_method" value="Apple Pay" {% if payment_method == 'Apple Pay' %}checked{% endif %}> Apple Pay</label>
            <label><input type="radio" name="payment_method" value="Cash" {% if payment_method == 'Cash' %}checked{% endif %}> Cash</label>
            <div class="button-row">
                <a class="secondary-button" href="{{ url_for('customer_info') }}">Back</a>
                <button type="submit">Submit Order</button>
            </div>
        </form>
    </section>
</main>
{% endblock %}

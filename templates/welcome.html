{% extends "base.html" %}
{% block header_title %}Welcome{% endblock %}
{% block body %}
<main class="hero-screen">
    <div class="overlay"></div>
    <section class="form-card centered-card">
        <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="Bistro Burnett" class="logo-large">
        <h2>Welcome! Let's get started.</h2>
        <p>Welcome to Bistro Burnett Ordering App! You can now skip the line and send in your order here.</p>
        <form method="post" class="stack-form">
            <label for="phone">Phone Number *</label>
            <input id="phone" name="phone" type="tel" inputmode="numeric" pattern="\d{10}" maxlength="10" placeholder="1234567890" value="{{ phone }}" oninput="this.value = this.value.replace(/\D/g, '').slice(0, 10)">
            <small>Enter exactly 10 digits with no spaces or symbols.</small>
            <button type="submit">Continue</button>
        </form>
    </section>
</main>
{% endblock %}
